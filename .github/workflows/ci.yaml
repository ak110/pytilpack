name: CI

on:
  push:
    tags-ignore:
      - "*"
    branches:
      - "**"
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # 開発モード: DeprecationWarningなどの隠れた問題を早期検出する
  PYTHONDEVMODE: "1"
  # サプライチェーン攻撃対策: uvがlockfileを常に尊重する
  UV_FROZEN: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: GitHub Actionsのピン留め検証
        run: |
          go install github.com/suzuki-shunsuke/pinact/v3/cmd/pinact@v3.9.0
          GOPATH_BIN="$(go env GOPATH)/bin"
          export PATH="$GOPATH_BIN:$PATH"
          pinact run --check

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "lts/*"

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v6.0.1
        with:
          version: latest

      - name: Configure pnpm security
        run: pnpm config set minimum-release-age 1440 --global

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "STORE_PATH=$(pnpm store path)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
          key: pnpm-store-${{ runner.os }}
          restore-keys: pnpm-store-${{ runner.os }}

      - name: Setup mise
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Test with pyfltr
        run: uv run pyfltr ci

      - name: Prune uv cache for CI
        run: uv cache prune --ci

  cli-smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Build wheel
        run: uv build --wheel

      - name: ベースのみで CLI が動作すること
        run: |
          set -euo pipefail
          wheel=$(ls dist/pytilpack-*.whl)
          uv venv .venv-base
          uv pip install --python .venv-base "$wheel"
          .venv-base/bin/pytilpack --help
          # ベース依存のみで完結するサブコマンドは --help が exit 0 で返ること。
          for args in "mcp --help" "fetch --help"; do
            # shellcheck disable=SC2086
            .venv-base/bin/pytilpack $args
          done
          # extras 必須のサブコマンドは argv の形に関わらず extras 案内で exit 2 になること。
          for args in "wait-for-db-connection --help" "babel --help"; do
            set +e
            # shellcheck disable=SC2086
            out=$(.venv-base/bin/pytilpack $args 2>&1); rc=$?
            set -e
            echo "---- pytilpack $args (exit=$rc) ----"
            echo "$out"
            test "$rc" = "2"
            echo "$out" | grep -qE 'extras \[(sqlalchemy|babel)\]'
          done

      - name: 各 extras で対応サブコマンドが動作すること
        run: |
          set -euo pipefail
          wheel=$(ls dist/pytilpack-*.whl)
          for extra in sqlalchemy babel; do
            case "$extra" in
              sqlalchemy) cmd="wait-for-db-connection --help" ;;
              babel) cmd="babel --help" ;;
            esac
            venv=".venv-$extra"
            uv venv "$venv"
            uv pip install --python "$venv" "pytilpack[$extra] @ $wheel"
            # shellcheck disable=SC2086
            "$venv/bin/pytilpack" $cmd
          done

      - name: Prune uv cache for CI
        run: uv cache prune --ci

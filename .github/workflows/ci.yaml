name: CI

on:
  push:
    tags-ignore:
      - "*"
    branches:
      - "**"
  pull_request:
    branches:
      - master

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  # 開発モード: DeprecationWarningなどの隠れた問題を早期検出する
  PYTHONDEVMODE: "1"
  # サプライチェーン攻撃対策: uvがlockfileを常に尊重する
  UV_FROZEN: "1"

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/ak110/pyfltr:latest
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: GitHub Actionsのピン留め検証
        run: pinact run --check

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /cache
          key: pyfltr-cache-${{ runner.os }}-py${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras --all-groups

      - name: Test with pyfltr
        run: uv run pyfltr ci

      - name: Prune uv cache for CI
        run: uv cache prune --ci

  cli-smoke:
    runs-on: ubuntu-latest
    needs: test
    container:
      image: ghcr.io/ak110/pyfltr:latest
    defaults:
      run:
        shell: bash
    env:
      UV_PYTHON: "3.13"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /cache
          key: pyfltr-cache-${{ runner.os }}-py3.13

      - name: Build wheel
        run: uv build --wheel

      - name: ベースのみで CLI が動作すること
        run: |
          set -euo pipefail
          wheel=$(ls dist/pytilpack-*.whl)
          uv venv .venv-base
          uv pip install --python .venv-base "$wheel"
          .venv-base/bin/pytilpack --help
          # ベース依存のみで完結するサブコマンドは --help が exit 0 で返ること。
          for args in "mcp --help" "fetch --help"; do
            # shellcheck disable=SC2086
            .venv-base/bin/pytilpack $args
          done
          # extras 必須のサブコマンドは argv の形に関わらず extras 案内で exit 2 になること。
          for args in "wait-for-db-connection --help" "babel --help"; do
            set +e
            # shellcheck disable=SC2086
            out=$(.venv-base/bin/pytilpack $args 2>&1); rc=$?
            set -e
            echo "---- pytilpack $args (exit=$rc) ----"
            echo "$out"
            test "$rc" = "2"
            echo "$out" | grep -qE 'extras \[(sqlalchemy|babel)\]'
          done

      - name: 各 extras で対応サブコマンドが動作すること
        run: |
          set -euo pipefail
          wheel=$(ls dist/pytilpack-*.whl)
          for extra in sqlalchemy babel; do
            case "$extra" in
              sqlalchemy) cmd="wait-for-db-connection --help" ;;
              babel) cmd="babel --help" ;;
            esac
            venv=".venv-$extra"
            uv venv "$venv"
            uv pip install --python "$venv" "pytilpack[$extra] @ $wheel"
            # shellcheck disable=SC2086
            "$venv/bin/pytilpack" $cmd
          done

      - name: Prune uv cache for CI
        run: uv cache prune --ci

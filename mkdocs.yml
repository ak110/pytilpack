site_name: pytilpack
site_description: Pythonのユーティリティ集
site_url: https://ak110.github.io/pytilpack/
repo_url: https://github.com/ak110/pytilpack
repo_name: ak110/pytilpack

theme:
  name: material
  language: ja
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: ダークモードに切り替え
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: ライトモードに切り替え
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight

exclude_docs: |
  README.md

plugins:
  - search:
      lang: ja
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: true
            members_order: source
            merge_init_into_class: true
            show_if_no_docstring: false
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: |
        ## インストール

        ```bash
        pip install pytilpack
        ```

        オプション依存: `pytilpack[all]`, `pytilpack[fastapi]`, `pytilpack[flask]`, `pytilpack[markdown]`, `pytilpack[msal]`, `pytilpack[pycryptodome]`, `pytilpack[pytest]`, `pytilpack[pyyaml]`, `pytilpack[quart]`, `pytilpack[sqlalchemy]`, `pytilpack[tiktoken]`, `pytilpack[tqdm]`

        ## 主な使い方

        各モジュールを個別に import して利用する。

        ```python
        import pytilpack.xxx
        ```

        `xxx` には対象ライブラリ名（`httpx` や `pathlib` など）が入る。
      sections:
        ドキュメント:
          - index.md: トップページ
          - cli.md: CLIコマンド
        ライブラリ用ユーティリティ:
          - api/asyncio.md
          - api/babel.md
          - api/base64.md
          - api/csv.md
          - api/dataclasses.md
          - api/datetime.md
          - api/fastapi.md
          - api/flask.md
          - api/flask_login.md
          - api/fnctl.md
          - api/functools.md
          - api/httpx.md
          - api/importlib.md
          - api/json.md
          - api/logging.md
          - api/markdown.md
          - api/msal.md
          - api/pathlib.md
          - api/pycrypto.md
          - api/pydantic.md
          - api/pytest.md
          - api/python.md
          - api/quart.md
          - api/quart_auth.md
          - api/sqlalchemy.md
          - api/threading.md
          - api/threadinga.md: asyncio版
          - api/tiktoken.md
          - api/tqdm.md
          - api/typing.md
          - api/yaml.md
        汎用モジュール:
          - api/cache.md: ファイルキャッシュ関連
          - api/crypto.md: 署名・トークン関連
          - api/data_url.md: データURL関連
          - api/environ.md: 環境変数関連
          - api/healthcheck.md: ヘルスチェック処理関連
          - api/htmlrag.md: HtmlRAG関連
          - api/http.md: HTTP関連
          - api/i18n.md: 国際化(i18n)関連
          - api/io.md: IO関連のユーティリティ
          - api/jsonc.md: JSON with Comments関連
          - api/paginator.md: ページネーション関連
          - api/random.md: 疑似乱数関連
          - api/ratelimit.md: レートリミッター
          - api/secrets.md: シークレットキー関連
          - api/sse.md: Server-Sent Events関連
          - api/validator.md: バリデーション関連
          - api/web.md: Web関連

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - toc:
      permalink: true

